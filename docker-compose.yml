services:

  # ── PHP-FPM Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peer_lend_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-peer_lend}
      DB_USERNAME: ${DB_USERNAME:-peer_lend_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - peer_lend_network

  # ── Nginx Web Server ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: peer_lend_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - peer_lend_network

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: peer_lend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-peer_lend}
      POSTGRES_USER: ${DB_USERNAME:-peer_lend_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # Expose on 5433 to avoid conflict with local PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-peer_lend_user} -d ${DB_DATABASE:-peer_lend}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - peer_lend_network

  # ── Redis Cache & Queue ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: peer_lend_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"   # Expose on 6380 to avoid conflict with local Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - peer_lend_network

  # ── Queue Worker ─────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peer_lend_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-peer_lend}
      DB_USERNAME: ${DB_USERNAME:-peer_lend_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - peer_lend_network

  # ── Task Scheduler ────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peer_lend_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: ${DB_DATABASE:-peer_lend}
      DB_USERNAME: ${DB_USERNAME:-peer_lend_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      - app
    networks:
      - peer_lend_network

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  peer_lend_network:
    driver: bridge
